defaults:
  - model: transformer        # MUST match the architecture of the loaded checkpoint
  - _self_

# Supervised finetuning of a CoT pre-trained model on a (possibly different)
# CoT dataset. Same masked-CE objective as `next_token.pretrain`; only the
# starting weights change (loaded from `init.ckpt_path`). Saved checkpoints
# are GRPO-compatible (only the base transformer's weights are written).

seed: 42
batch_size: 256
mixed_precision: bf16

data:
  # Folder name under `data_dir` produced by `next_token.generate_data_pretrain`.
  # All graph/CoT params are read from `<dataset>/meta.json`.
  dataset: deg5_path5_nodes100_cot_b0-4_d4-4
  data_dir: next_token/data
  n_train: null             # optional cap (null = use whole train.bin)
  n_test: null              # optional cap (null = use whole test.bin)

init:
  # Path to a checkpoint produced by `next_token.pretrain` (`final.pt`).
  ckpt_path: ???
  strict: true              # state_dict load strictness

optimizer:
  lr: 1.0e-5
  min_lr: 1.0e-6
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.0
  grad_clip: 1.0

schedule:
  epochs: 1
  warmup_steps: 50
  use_cosine: true

eval:
  every_pct: 0.1            # full eval every X% of total training steps
  max_batches: null         # cap eval batches (null = full test set)
  temperature: 0.8          # sampling temperature for the AR eval
  top_k: null               # optional top-k filter (null = off)
  log_samples: 4            # number of decoded sampled traces to print/log per eval (0 = off)

checkpoint:
  save_dir: null            # null -> ${hydra.run.dir}/ckpt
  save_final: true          # save state_dict + meta + cfg at end of finetuning
  save_every_eval: false    # also dump a snapshot after every run_eval

logging:
  wandb: true
  entity: "bicycleman15"
  project: next_token_finetune
  name: ""                  # optional tag prepended to the auto-built run name

hydra:
  run:
    dir: ${hydra:runtime.cwd}/Results/next_token/finetune/${model.name}/${data.dataset}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${hydra:runtime.cwd}/Results/next_token/finetune/${model.name}/${data.dataset}/${now:%Y-%m-%d}
    subdir: ${now:%H-%M-%S}_${hydra.job.num}
