defaults:
  - data: paper
  - model: transformer
  - _self_

# Defaults follow the original "Next-Token-Failures" repo:
#   https://github.com/gregorbachmann/Next-Token-Failures
# (deg=2, path=5, num_nodes=50, 6L/384D/6H, batch=256, lr=1e-4, AdamW)
seed: 42
project_name: next_token_star_graph
batch_size: 256

# Train objective knobs (orthogonal to the data file we load).
# Reverse / teacherless data is generated by next_token.generate_data and the
# corresponding subdir name is `deg{deg}_path{p}_nodes{n}_rev`. Set
# `data.reverse=true` here to point the loader at that subdir.
data:
  reverse: false
  teacherless: false
  data_dir: next_token/data

optimizer:
  lr: 1e-4
  betas: [0.9, 0.95]
  eps: 1e-8
  weight_decay: 0.0
  grad_clip: 1.0

schedule:
  epochs: 100
  warmup_steps: 100
  use_cosine: true

mixed_precision: bf16

eval:
  every_pct: 0.1          # run eval every X% of total training steps
  free_generation: true   # also run greedy autoregressive eval
  max_batches: null       # cap eval batches (null = full test set)

logging:
  wandb: true
  entity: null

checkpoint:
  save_dir: checkpoints
  save_on_improve: false   # disable best-checkpoint saving
  save_final: false        # disable final-checkpoint saving

hydra:
  run:
    dir: ${hydra:runtime.cwd}/Results/next_token/${model.name}/deg${data.deg}_path${data.path_len}_nodes${data.num_nodes}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${hydra:runtime.cwd}/Results/next_token/${model.name}/deg${data.deg}_path${data.path_len}_nodes${data.num_nodes}/${now:%Y-%m-%d}
    subdir: ${now:%H-%M-%S}_${hydra.job.num}
