defaults:
  - model: transformer
  - _self_

# Pre-training a vanilla transformer on CoT-with-backtracking traces produced
# by `next_token.generate_data_pretrain`. Eval = sample the trace with
# temperature, scan for `</think>`, then read the next `path_len` tokens.

seed: 42
batch_size: 256
mixed_precision: bf16

data:
  # Folder name under `data_dir` produced by `next_token.generate_data_pretrain`
  # (default name encodes the params, but you can pass `--name=...` at gen time
  # and reference that here). All graph/CoT params are read from
  # `<dataset>/meta.json` at training time.
  dataset: deg5_path5_nodes100_cot_b0-4_d4-4
  data_dir: next_token/data
  n_train: null             # optional cap (null = use whole train.bin)
  n_test: null              # optional cap (null = use whole test.bin)

optimizer:
  lr: 1e-4
  min_lr: 0.0
  betas: [0.9, 0.95]
  eps: 1e-8
  weight_decay: 0.0
  grad_clip: 1.0

schedule:
  epochs: 100
  warmup_steps: 100
  use_cosine: true

eval:
  every_pct: 0.1            # full eval every X% of total training steps
  max_batches: null         # cap eval batches (null = full test set)
  temperature: 0.8          # sampling temperature for the AR eval
  top_k: null               # optional top-k filter (null = off)
  log_samples: 4            # number of decoded sampled traces to print/log per eval (0 = off)

checkpoint:
  save_dir: null            # null -> ${hydra.run.dir}/ckpt
  save_final: true          # save state_dict + meta + cfg at end of training
  save_every_eval: false    # also dump a snapshot after every run_eval

# NextLat auxiliary objective (https://arxiv.org/abs/2511.05963).
# When enabled, wraps the base transformer with `next_token.nextlat.NextLatWrapper`
# which adds a residual MLP latent-dynamics model trained jointly with the
# standard CE objective:
#   L_total = L_next + lambda_h * L_next_h + lambda_kl * L_kl
# Only supported for `model.name=transformer`. Saved checkpoints contain only
# the inner transformer's weights so GRPO can load them as-is.
nextlat:
  enabled: false
  horizon: null             # null -> max(1, path_len - 2) (paper Sec 4.3 default)
  lambda_h: 1.0
  lambda_kl: 1.0
  n_hidden_layers: 2
  hidden_mult: 4
  stop_grad_target: true
  mask_kl: true             # mask -100 positions out of the KL average

logging:  
  wandb: true
  entity: "bicycleman15"
  project: next_token_pretrain
  name: ""                  # optional tag prepended to the auto-built run name

hydra:
  run:
    dir: ${hydra:runtime.cwd}/Results/next_token/pretrain/${model.name}/${data.dataset}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${hydra:runtime.cwd}/Results/next_token/pretrain/${model.name}/${data.dataset}/${now:%Y-%m-%d}
    subdir: ${now:%H-%M-%S}_${hydra.job.num}
