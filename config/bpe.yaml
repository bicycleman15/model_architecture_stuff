hydra:
  run:
    dir: Results/hydra_outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: false

# disable hydra logging
defaults:
    - _self_

# set the seed for reproducibility
seed: 42

dataset:
    name: fineweb

    path: /gpfs/data/ranganathlab/Jatin/model_architecture_stuff/data/fineweb-5b
    tokenizer_name: "gpt2"
    vocab_size: 50257

results_dir: Results

wandb:
    project: fineweb-bpe
    exp_name: default

################################################################################

# Training-related arguments.
train:

    # Number of optimizer steps between saving checkpoints
    save_interval: 100000

    # Number of workers for loading data
    num_workers: 4

    # Global batch size (total across all GPUs and grad accum steps)
    global_batch_size: 512

    # Per-GPU batch size (grad_accum is computed automatically)
    batch_size: 128

    # Number of optimizer steps
    train_steps: 20000

    # Warmup steps percentage (used if warmup_steps is 0)
    warmup_steps_percentage: 0.1

    # Warmup steps (if > 0, warmup_steps_percentage is ignored)
    warmup_steps: 1000

    # Gradient clipping
    grad_norm: 1.0

    norm_eps: 0.00001

# Evaluation-related arguments.
eval:

    # Number of optimizer steps between testing
    eval_interval: 2000

    # Iters for testing
    eval_iters: 100

# Optimizer-related arguments
optimizer:

    # Which optimizer to use: adamw | sgd | muon
    name: adamw

    # Base learning rate (drives the cosine/warmup schedule for every param group)
    lr: 8e-4

    # Minimum learning rate
    min_lr: 8e-5

    # Weight decay (AdamW side when using Muon)
    weight_decay: 0.1

    # Betas (beta1, beta2) -- used by AdamW (including the aux AdamW inside Muon)
    betas: [0.9, 0.95]

    # ----- SGD-only -----
    # Momentum for name=sgd
    momentum: 0.9

    # ----- Muon-only (name=muon) -----
    # LR for the Muon (Newton-Schulz orthogonalized) matrix params
    muon_lr: 0.02
    # Decoupled weight decay for Muon params (usually 0)
    muon_weight_decay: 0.0
    # SGD-style momentum coefficient inside Muon
    muon_momentum: 0.95
    # Use Nesterov-style lookahead momentum
    muon_nesterov: True
    # Number of Newton-Schulz iterations per step (5 is canonical)
    muon_ns_steps: 5
    # LR for the aux AdamW group (embeddings / lm_head / norms / biases)
    # Classical guidance is ~10x smaller than muon_lr
    adamw_lr: 2e-3

# results directory
# don't change this, it will be set by the script
result_dir:

# choose from [transformer, hourglass]
model_type: transformer

transformer:
    name: transformer

    dim: 768
    block_size: 2048

    n_layer: 12
    n_head: 12

    use_fused_ops: True
    use_qk_norm: True


path_transformer:
    name: path_transformer

    dim: 768
    block_size: 2048

    n_layer: 12
    n_head: 12

    initializer_range: 0.02

    # Tikhonov damping inside PathPreservingAutograd.backward:
    #   modified_grad = grad_output / (softmax(theta) + damping)
    # Smaller => closer to exact natural gradient (more aggressive 1/p scaling);
    # larger => more conservative (caps the max rescale at ~1/damping).
    damping: 0.01

    # PathPreservingAutograd needs raw logits, so fused linear+CE is disabled.
    use_fused_ops: False
    use_qk_norm: True


# Populate the model settings based on selection in model_type
model: ${${model_type}}