hydra:
  run:
    dir: Results/hydra_outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: false

# disable hydra logging
defaults:
    - _self_

# set the seed for reproducibility
seed: 42

dataset:
    name: fineweb

    path: /scratch/jp7467/model_architecture_stuff/data/fineweb-5b
    tokenizer_name: "gpt2"
    vocab_size: 50257

results_dir: Results

wandb:
    project: fineweb-residual
    exp_name: default

################################################################################

# Training-related arguments.
train:

    # Number of optimizer steps between saving checkpoints
    save_interval: 1000000000

    # Number of workers for loading data
    num_workers: 4

    # Global batch size (total across all GPUs and grad accum steps)
    global_batch_size: 512

    # Per-GPU batch size (grad_accum is computed automatically)
    batch_size: 128

    # Number of optimizer steps
    train_steps: 20000

    # Warmup steps percentage (used if warmup_steps is -1)
    warmup_steps_percentage: 0.1

    # Warmup steps (if >= 0, used directly; set to -1 to use warmup_steps_percentage)
    warmup_steps: -1

    # Gradient clipping
    grad_norm: 1.0

    norm_eps: 0.00001

# Evaluation-related arguments.
eval:

    # Number of optimizer steps between testing
    eval_interval: 2000

    # Iters for testing
    eval_iters: 100

# Optimizer-related arguments
optimizer:

    # Learning rate 
    lr: 8e-4

    # Minimum learning rate
    min_lr: 8e-5

    # Weight decay
    weight_decay: 0.1

    # Betas (beta1, beta2)
    betas: [0.9, 0.95]

# results directory
# don't change this, it will be set by the script
result_dir:

# choose from [transformer, hourglass]
model_type: transformer

transformer:
    name: transformer

    dim: 768
    block_size: 2048

    n_layer: 12
    n_head: 12

    use_fused_ops: True
    use_qk_norm: True


mean_residual_transformer:
    name: mean_residual_transformer

    dim: 768
    block_size: 2048

    n_layer: 12
    n_head: 12

    alpha: 1.0
    mean_power: 1.0

    use_fused_ops: True
    use_qk_norm: True


# Populate the model settings based on selection in model_type
model: ${${model_type}}