defaults:
  - data: s3_128
  - model: deltaproduct
  - _self_

# Defaults follow the DeltaProduct paper (arXiv:2502.10297, Appendix C.1):
# train at k=128, test at k=512, 100 epochs, batch 2048, lr 1e-3, no curriculum.
seed: 42
project_name: state_tracking
batch_size: 2048
grad_accum: 1

optimizer:
  lr: 1.0e-3
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6
  grad_clip: 1.0

schedule:
  epochs: 30
  warmup_ratio: 0.05
  use_cosine: true

mixed_precision: bf16   # passed to Accelerator(); one of: no, fp16, bf16, fp8

# Curriculum is NOT used in the paper. Kept here as an optional knob for
# harder settings (e.g. Transformer baseline on long sequences).
curriculum:
  enabled: false
  start_idx: 2
  loss_threshold: 0.3
  step: 1

eval:
  every_n_epochs: 1

checkpoint:
  save_dir: checkpoints
  save_on_improve: true

logging:
  wandb: true
  entity: null

hydra:
  run:
    dir: ${hydra:runtime.cwd}/Results/state_tracking/${model.name}/${data.group}_k${data.k}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${hydra:runtime.cwd}/Results/state_tracking/${model.name}/${data.group}_k${data.k}/${now:%Y-%m-%d}
    subdir: ${now:%H-%M-%S}_${hydra.job.num}
